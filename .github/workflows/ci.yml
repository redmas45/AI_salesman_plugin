name: AI Hub CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  checks:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: shopbot
          POSTGRES_PASSWORD: shopbot_password
          POSTGRES_DB: shopping_db
        ports:
          - 5434:5432
        options: >-
          --health-cmd "pg_isready -U shopbot -d shopping_db"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgresql://shopbot:shopbot_password@localhost:5434/shopping_db
      CRM_ADMIN_TOKEN: ci-token
      AZURE_OPENAI_API_KEY: ""
      AZURE_OPENAI_BASE_URL: ""
      CRAWL_ON_STARTUP: "false"
      CRAWL_PERIODIC_ENABLED: "false"
      ENSURE_DEFAULT_CLIENT_ON_STARTUP: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements.txt
      - run: python -m pip check
      - run: pnpm run contracts:check
      - run: pnpm --filter ai-hub-crm lint
      - run: pnpm --filter client-panel lint
      - run: pnpm -r run build
      - run: python -m compileall agent api db tests
      - run: python -m pytest -q
