services:
  db:
    image: pgvector/pgvector:pg16
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: shopbot
      POSTGRES_PASSWORD: shopbot_password
      POSTGRES_DB: shopping_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shopbot -d shopping_db"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: always

  app:
    build:
      context: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      HOST: 0.0.0.0
      PORT: 8585
      DATABASE_URL: postgresql://shopbot:shopbot_password@db:5432/shopping_db
      PUBLIC_API_URL: ${HUB_PUBLIC_URL:-${PUBLIC_API_URL:-http://143.198.5.97/aihub}}
      PUBLIC_STOREFRONT_ORIGIN: ${PUBLIC_STOREFRONT_ORIGIN:-http://143.198.5.97}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://143.198.5.97}
      CURRENT_SITE_ID: ${CURRENT_SITE_ID:-site_1}
      DEFAULT_SITE_ID: ${DEFAULT_SITE_ID:-site_1}
      AI_DEFAULT_SITE_ID: ${AI_DEFAULT_SITE_ID:-site_1}
      CURRENT_URL: ${CURRENT_URL:-}
      CRAWL_ON_STARTUP: ${CRAWL_ON_STARTUP:-false}
      CRAWL_PERIODIC_ENABLED: ${CRAWL_PERIODIC_ENABLED:-false}
      ENSURE_DEFAULT_CLIENT_ON_STARTUP: ${ENSURE_DEFAULT_CLIENT_ON_STARTUP:-false}
      CLEAN_SYNTHETIC_DEMO_CLIENTS_ON_STARTUP: ${CLEAN_SYNTHETIC_DEMO_CLIENTS_ON_STARTUP:-true}
      CRAWL_MAX_PAGES: ${CRAWL_MAX_PAGES:-60}
      CRAWL_MAX_DEPTH: ${CRAWL_MAX_DEPTH:-3}
      AZURE_OPENAI_API_KEY: ${AZURE_OPENAI_API_KEY:-}
      AZURE_OPENAI_BASE_URL: ${AZURE_OPENAI_BASE_URL:-}
      AZURE_OPENAI_CHAT_DEPLOYMENT: ${AZURE_OPENAI_CHAT_DEPLOYMENT:-gpt-5.4-mini}
      AZURE_OPENAI_STT_DEPLOYMENT: ${AZURE_OPENAI_STT_DEPLOYMENT:-gpt-4o-mini-transcribe}
      AZURE_OPENAI_TTS_DEPLOYMENT: ${AZURE_OPENAI_TTS_DEPLOYMENT:-gpt-4o-mini-tts}
      AZURE_OPENAI_REASONING_EFFORT: ${AZURE_OPENAI_REASONING_EFFORT:-none}
      AZURE_OPENAI_TTS_VOICE: ${AZURE_OPENAI_TTS_VOICE:-coral}
      AZURE_OPENAI_TIMEOUT_SECONDS: ${AZURE_OPENAI_TIMEOUT_SECONDS:-30}
      CRM_ADMIN_TOKEN: ${CRM_ADMIN_TOKEN:-}
      CLIENT_PANEL_DEFAULT_PASSWORD: ${CLIENT_PANEL_DEFAULT_PASSWORD:-}
      CLIENT_PANEL_TOKEN_SECRET: ${CLIENT_PANEL_TOKEN_SECRET:-}
    ports:
      - "127.0.0.1:5176:8585"
    volumes:
      - ./.env:/app/.env
      - ./data:/app/data
      - hf_cache:/root/.cache/huggingface
    restart: always

volumes:
  postgres_data:
  hf_cache:
