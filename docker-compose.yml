version: '3.8'
services:
  db:
    image: pgvector/pgvector:pg16
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: shopbot
      POSTGRES_PASSWORD: shopbot_password
      POSTGRES_DB: shopping_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

volumes:
  postgres_data:
