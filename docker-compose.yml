services:
  db:
    image: pgvector/pgvector:pg16
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: shopbot
      POSTGRES_PASSWORD: shopbot_password
      POSTGRES_DB: shopping_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shopbot -d shopping_db"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: always

  app:
    build:
      context: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      HOST: 0.0.0.0
      PORT: 8585
      DATABASE_URL: postgresql://shopbot:shopbot_password@db:5432/shopping_db
      PUBLIC_API_URL: ${HUB_PUBLIC_URL:-${PUBLIC_API_URL:-http://143.198.5.97/aihub}}
      PUBLIC_STOREFRONT_ORIGIN: ${PUBLIC_STOREFRONT_ORIGIN:-http://143.198.5.97}
      CURRENT_SITE_ID: ${CURRENT_SITE_ID:-ai_kart}
      DEFAULT_SITE_ID: ${DEFAULT_SITE_ID:-ai_kart}
      AI_DEFAULT_SITE_ID: ${AI_DEFAULT_SITE_ID:-ai_kart}
      CURRENT_URL: ${CLIENT_STORE_URL:-http://143.198.5.97/}
      CRAWL_ON_STARTUP: ${CRAWL_ON_STARTUP:-true}
      CRAWL_PERIODIC_ENABLED: ${CRAWL_PERIODIC_ENABLED:-true}
      CRAWL_MAX_PAGES: ${CRAWL_MAX_PAGES:-60}
      CRAWL_MAX_DEPTH: ${CRAWL_MAX_DEPTH:-3}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      STT_PROVIDER: ${STT_PROVIDER:-groq}
      TTS_PROVIDER: ${TTS_PROVIDER:-groq}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      CRM_ADMIN_TOKEN: ${CRM_ADMIN_TOKEN:-}
    ports:
      - "127.0.0.1:5176:8585"
    volumes:
      - ./.env:/app/.env
      - ./data:/app/data
    restart: always

volumes:
  postgres_data:
