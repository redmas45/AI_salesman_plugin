<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AI Hub CRM</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body data-theme="light">
    <div class="shell">
      <aside class="sidebar">
        <button class="brand-block brand-button" id="brand-home-button" type="button" aria-label="Open dashboard">
          <div class="brand-mark">AH</div>
          <div>
            <div class="brand-title">AI Hub CRM</div>
            <div class="brand-subtitle">hub admin panel</div>
          </div>
        </button>

        <nav class="nav-group" aria-label="CRM navigation">
          <div class="nav-label">Overview</div>
          <button class="nav-item active" data-view="dashboard" type="button">
            <span>Dashboard</span>
          </button>
          <button class="nav-item" data-view="clients" type="button">
            <span>Clients</span>
          </button>
          <div class="nav-label">Data</div>
          <button class="nav-item" data-view="catalogs" type="button">
            <span>Catalogs</span>
          </button>
          <button class="nav-item" data-view="usage" type="button">
            <span>Usage</span>
          </button>
          <button class="nav-item" data-view="conversations" type="button">
            <span>Conversations</span>
          </button>
          <button class="nav-item" data-view="analytics" type="button">
            <span>Analytics</span>
          </button>
          <div class="nav-label">System</div>
          <button class="nav-item" data-view="adapters" type="button">
            <span>Adapters</span>
          </button>
          <button class="nav-item" data-view="settings" type="button">
            <span>Settings</span>
          </button>
          <button class="nav-item" data-view="health" type="button">
            <span>Health</span>
          </button>
        </nav>
      </aside>

      <main class="workspace">
        <header class="topbar">
          <div>
            <div class="eyebrow" id="breadcrumb">Dashboard</div>
            <h1 id="page-title">Dashboard</h1>
          </div>
          <div class="topbar-actions">
            <span class="status-pill" id="hub-status">hub checking</span>
            <button class="button theme-toggle" id="theme-toggle-button" type="button">Light mode</button>
            <button class="button ghost" id="refresh-button" type="button">Refresh</button>
            <button class="button primary" id="add-client-button" type="button">Add client</button>
          </div>
        </header>

        <section id="view-root" class="view-root" aria-live="polite"></section>
      </main>
    </div>

    <dialog id="client-dialog" class="dialog">
      <form id="client-form" method="dialog" class="dialog-panel">
        <div class="dialog-header">
          <div>
            <div class="eyebrow">Client</div>
            <h2>Add client</h2>
          </div>
          <button class="icon-button" data-close-dialog type="button" aria-label="Close">x</button>
        </div>
        <label class="field">
          <span>Client name</span>
          <input name="name" required maxlength="120" placeholder="AI-KART">
        </label>
        <label class="field">
          <span>Website URL</span>
          <input name="store_url" required maxlength="500" placeholder="https://client-store.com">
        </label>
        <label class="field">
          <span>Site ID</span>
          <input name="site_id" maxlength="80" placeholder="auto generated">
        </label>
        <div class="field-grid">
          <label class="field">
            <span>Deploy mode</span>
            <select name="deploy_mode">
              <option value="intranet">intranet</option>
              <option value="domain">domain</option>
              <option value="public-ip">public-ip</option>
              <option value="custom">custom</option>
            </select>
          </label>
          <label class="field">
            <span>Plan</span>
            <input name="plan" value="Commerce plan" maxlength="80">
          </label>
        </div>
        <label class="field">
          <span>Adapter</span>
          <input name="adapter_name" value="generic_adapter.js" maxlength="160">
        </label>
        <menu class="dialog-actions">
          <button class="button ghost" data-close-dialog type="button">Cancel</button>
          <button class="button primary" id="create-client-submit" value="default" type="submit">Create</button>
        </menu>
      </form>
    </dialog>

    <div class="toast" id="toast" role="status"></div>
    <script src="app.js" defer></script>
  </body>
</html>
