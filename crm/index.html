<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="AI Hub CRM for client, crawler, catalog, usage, and analytics operations." />
    <script>
      try {
        document.documentElement.dataset.theme = localStorage.getItem('aiHubCrmTheme') === 'dark' ? 'dark' : 'light';
      } catch {
        document.documentElement.dataset.theme = 'light';
      }
    </script>
    <title>AI Hub CRM</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
