<svg width="680" viewBox="0 0 680 740" xmlns="http://www.w3.org/2000/svg" style="background:#fff;font-family:Arial,sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Phase label: setup -->
  <text x="340" y="28" text-anchor="middle" font-size="12" fill="#999">— one-time operator setup —</text>

  <!-- .env config -->
  <rect x="190" y="40" width="300" height="52" rx="8" fill="#f1efe8" stroke="#888780" stroke-width="0.5"/>
  <text x="340" y="62" text-anchor="middle" font-size="14" font-weight="500" fill="#2c2c2a" dominant-baseline="central">.env config</text>
  <text x="340" y="80" text-anchor="middle" font-size="11" fill="#5f5e5a" dominant-baseline="central">STORE_URL=https://vercelclonedwebsite.vercel.app</text>

  <line x1="340" y1="92" x2="340" y2="118" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Crawl4AI -->
  <rect x="150" y="118" width="380" height="56" rx="8" fill="#e1f5ee" stroke="#0f6e56" stroke-width="0.5"/>
  <text x="340" y="140" text-anchor="middle" font-size="14" font-weight="500" fill="#085041" dominant-baseline="central">Crawl4AI crawls STORE_URL</text>
  <text x="340" y="158" text-anchor="middle" font-size="11" fill="#0f6e56" dominant-baseline="central">Discovers all product pages → extracts name, price, description</text>

  <line x1="340" y1="174" x2="340" y2="200" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Embed + store -->
  <rect x="150" y="200" width="380" height="56" rx="8" fill="#e1f5ee" stroke="#0f6e56" stroke-width="0.5"/>
  <text x="340" y="222" text-anchor="middle" font-size="14" font-weight="500" fill="#085041" dominant-baseline="central">Chunk → embed → store in pgvector</text>
  <text x="340" y="240" text-anchor="middle" font-size="11" fill="#0f6e56" dominant-baseline="central">Each product = a vector. Keyed by site_id.</text>

  <line x1="340" y1="256" x2="340" y2="282" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Script tag -->
  <rect x="100" y="282" width="480" height="52" rx="8" fill="#f1efe8" stroke="#888780" stroke-width="0.5"/>
  <text x="340" y="302" text-anchor="middle" font-size="14" font-weight="500" fill="#2c2c2a" dominant-baseline="central">Operator pastes script tag (once, permanent)</text>
  <text x="340" y="320" text-anchor="middle" font-size="11" fill="#5f5e5a" dominant-baseline="central">&lt;script src="ngrok.../shopbot.js?site=https_vercel_store"&gt;&lt;/script&gt;</text>

  <!-- Divider -->
  <line x1="80" y1="355" x2="600" y2="355" stroke="#ccc" stroke-width="0.5" stroke-dasharray="4 4"/>
  <text x="340" y="372" text-anchor="middle" font-size="12" fill="#999">— runtime (every user query) —</text>

  <!-- User speaks -->
  <rect x="220" y="382" width="240" height="44" rx="8" fill="#eeedfe" stroke="#534ab7" stroke-width="0.5"/>
  <text x="340" y="408" text-anchor="middle" font-size="14" font-weight="500" fill="#3c3489" dominant-baseline="central">User speaks into widget</text>

  <line x1="340" y1="426" x2="340" y2="452" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- STT -->
  <rect x="220" y="452" width="240" height="44" rx="8" fill="#eeedfe" stroke="#534ab7" stroke-width="0.5"/>
  <text x="340" y="478" text-anchor="middle" font-size="14" font-weight="500" fill="#3c3489" dominant-baseline="central">STT → text query</text>

  <line x1="340" y1="496" x2="340" y2="522" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- RAG -->
  <rect x="150" y="522" width="380" height="56" rx="8" fill="#faece7" stroke="#993c1d" stroke-width="0.5"/>
  <text x="340" y="544" text-anchor="middle" font-size="14" font-weight="500" fill="#711b13" dominant-baseline="central">RAG: embed query → vector search pgvector</text>
  <text x="340" y="562" text-anchor="middle" font-size="11" fill="#993c1d" dominant-baseline="central">Top-k matching products returned as context</text>

  <line x1="340" y1="578" x2="340" y2="604" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- LLM -->
  <rect x="190" y="604" width="300" height="44" rx="8" fill="#faece7" stroke="#993c1d" stroke-width="0.5"/>
  <text x="340" y="630" text-anchor="middle" font-size="14" font-weight="500" fill="#711b13" dominant-baseline="central">LLM generates product answer</text>

  <line x1="340" y1="648" x2="340" y2="674" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- TTS -->
  <rect x="190" y="674" width="300" height="44" rx="8" fill="#eeedfe" stroke="#534ab7" stroke-width="0.5"/>
  <text x="340" y="700" text-anchor="middle" font-size="14" font-weight="500" fill="#3c3489" dominant-baseline="central">TTS → voice reply to user</text>

</svg>
